# --- terminal / colour ---
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:RGB"

# --- sane UX ---
set -g mouse on
set -g history-limit 100000
setw -g mode-keys vi

# --- prefix: C-a ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- splits ---
unbind '"'
unbind %
bind | split-window -h
bind - split-window -v

# --- pane navigation ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- reload ---
bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"

# --- IMPORTANT: keep SSH agent env updated (1Password, etc.) ---
set -g update-environment "SSH_AUTH_SOCK SSH_AGENT_PID"

# Start windows/panes at 1 (muscle memory friendly)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Quicker escape from copy-mode / vi
set -sg escape-time 10

# Allow nvim to receive certain keys quickly
set -g focus-events on

# Fix literal ^[[200~ / bracketed paste weirdness
#set -g assume-paste-time 0
#set -g set-clipboard on

# Smart pane switching with awareness of Vim splits
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(n?vim)$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
